name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_ENV: "test"
  DB_USER: "admin"
  DB_PASSWORD: "password123"
  DB_HOST: "localhost"
  DB_PORT: "5433"
  DB_NAME: "phase_one_db"
  DATABASE_URL: "postgresql://admin:password123@localhost:5433/phase_one_db?schema=public"
  JWT_SECRET: "test-jwt-secret-key-12345"
  REDIS_HOST: "localhost"
  REDIS_PORT: 6379

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 🐳 Start Infrastructure (Postgres & Redis)
      run: docker compose up -d postgres redis
      # รอให้ Database และ Redis พร้อมทำงานก่อนที่จะรันสคริปต์ต่อไป

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🛠️ Generate Prisma Client
      run: npx prisma generate

    - name: 🗄️ Run Database Migrations
      run: npx prisma migrate deploy
      # คำสั่งนี้จะบังคับให้ Prisma สร้างตารางต่างๆ ตาม schema.prisma ทันที

    - name: 🧹 Run Linter
      run: npm run lint

    - name: 🧪 Run Unit Tests
      run: npm run test

    - name: 🚀 Run E2E Tests
      run: npm run test:e2e

    - name: 🏗️ Build Application
      run: npm run build

  # (Optional) ตัวอย่าง Job สำหรับการสร้าง Docker Image เมื่อโค้ดทุกอย่างผ่าน
  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐳 Build Docker Image
      run: docker build -t phase-one-app:latest .
      
    # หลังจากนี้ในระบบจริง คุณสามารถเพิ่มคำสั่ง docker push เพื่อส่ง Image ไปยัง Docker Hub หรือ AWS ECR ได้
